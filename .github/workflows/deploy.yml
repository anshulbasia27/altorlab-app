name: Deploy to Vercel
on:
  push:
    branches: [main]
    paths:
      - 'consumer/altorlab-app/**'
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install Vercel CLI
        run: npm install -g vercel
      - name: Deploy to Vercel
        run: |
          cd consumer/altorlab-app
          vercel --prod --token=${{ secrets.VERCEL_TOKEN }} \
            --env REPLICATE_API_TOKEN=${{ secrets.REPLICATE_API_TOKEN }} \
            --env RAZORPAY_KEY_ID=${{ secrets.RAZORPAY_KEY_ID }} \
            --env RAZORPAY_KEY_SECRET=${{ secrets.RAZORPAY_KEY_SECRET }} \
            --env NEXT_PUBLIC_RAZORPAY_KEY_ID=${{ secrets.NEXT_PUBLIC_RAZORPAY_KEY_ID }} \
            --env NEXT_PUBLIC_GA_ID=${{ secrets.NEXT_PUBLIC_GA_ID }} \
            --env BLOB_READ_WRITE_TOKEN=${{ secrets.BLOB_READ_WRITE_TOKEN }} \
            --env INDEXNOW_KEY=${{ secrets.INDEXNOW_KEY }}
