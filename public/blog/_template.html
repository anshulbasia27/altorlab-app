<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{TITLE}} — AltorLab Blog</title>
  <meta name="description" content="{{META_DESCRIPTION}}">
  <link rel="canonical" href="https://app.altorlab.org/blog/{{SLUG}}/">
  <meta property="og:title" content="{{TITLE}}">
  <meta property="og:description" content="{{META_DESCRIPTION}}">
  <meta property="og:url" content="https://app.altorlab.org/blog/{{SLUG}}/">
  <meta property="og:type" content="article">
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "BlogPosting",
    "headline": "{{TITLE}}",
    "description": "{{META_DESCRIPTION}}",
    "url": "https://app.altorlab.org/blog/{{SLUG}}/",
    "datePublished": "{{DATE}}",
    "author": {"@type": "Organization", "name": "AltorLab"},
    "publisher": {"@type": "Organization", "name": "AltorLab", "url": "https://altorlab.org"}
  }
  </script>
  <!-- GA4 -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-G0NWRDY54H"></script>
  <script>window.dataLayer=window.dataLayer||[];function gtag(){dataLayer.push(arguments);}gtag('js',new Date());gtag('config','G-G0NWRDY54H');</script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: system-ui, -apple-system, sans-serif; background: #0f172a; color: #cbd5e1; min-height: 100vh; line-height: 1.7; }
    .container { max-width: 768px; margin: 0 auto; padding: 3rem 1rem; }
    h1 { color: #fff; font-size: 2.25rem; margin-bottom: 1rem; line-height: 1.3; }
    h2 { color: #e2e8f0; font-size: 1.5rem; margin: 2rem 0 0.75rem; }
    h3 { color: #e2e8f0; font-size: 1.25rem; margin: 1.5rem 0 0.5rem; }
    p { margin-bottom: 1rem; color: #94a3b8; }
    ul, ol { margin: 0.5rem 0 1rem 1.5rem; color: #94a3b8; }
    li { margin-bottom: 0.25rem; }
    a { color: #818cf8; }
    .meta { color: #64748b; font-size: 0.875rem; margin-bottom: 2rem; }
    .cta-box { background: #312e81; border: 1px solid #4338ca; border-radius: 1rem; padding: 1.5rem; text-align: center; margin: 2rem 0; }
    .cta-box h3 { color: #c7d2fe; margin: 0 0 0.5rem; }
    .cta-box p { color: #a5b4fc; margin-bottom: 1rem; }
    .cta-btn { display: inline-block; background: #6366f1; color: #fff; padding: 0.75rem 1.5rem; border-radius: 0.75rem; text-decoration: none; font-weight: 600; }
    .cta-btn:hover { background: #818cf8; }
    footer { border-top: 1px solid #1e293b; padding: 1.5rem 1rem; text-align: center; color: #64748b; font-size: 0.875rem; }
    footer a { color: #94a3b8; text-decoration: none; margin: 0 0.5rem; }
    .breadcrumb { color: #64748b; font-size: 0.875rem; margin-bottom: 1.5rem; }
    .breadcrumb a { color: #818cf8; text-decoration: none; }
  </style>
</head>
<body>
  <div class="container">
    <div class="breadcrumb"><a href="/">AltorLab</a> → <a href="/blog/">Blog</a> → {{TITLE}}</div>
    <h1>{{TITLE}}</h1>
    <p class="meta">Published {{DATE}} · By AltorLab Team</p>
    {{CONTENT}}
    <div class="cta-box">
      <h3>Ready to redesign your room?</h3>
      <p>Upload your room photo and see it transformed with AI in seconds.</p>
      <a href="/room-redesign" class="cta-btn">Try AI Room Redesign — ₹749 →</a>
    </div>
  </div>
  <footer>
    <p>© 2026 AltorLab. All rights reserved.</p>
    <div style="margin-top: 0.5rem;">
      <a href="/privacy">Privacy</a>
      <a href="/terms">Terms</a>
      <a href="mailto:hello@altorlab.org">Contact</a>
    </div>
  </footer>
</body>
</html>
